<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLIXSTORE</title>
    <meta http-equiv="refresh" content="60">
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <meta name="description" content="website storemc PLIXSTORE, ayo kunjungi website kami!">
    
    <!-- Favicon -->
    <link rel="icon" href="img/icon.png" type="image/png">

    <!-- Open Graph meta tags -->
    <meta property="og:title" content="PLIXSTORE">
    <meta property="og:description" content="Halo kami plixstore menyediakan berbagai macam kebutuhan server dan minecraft anda berbagai build skin resource packs dan sebagainya.">
    <meta property="og:image" content="https://plixsmp.my.id/img/icona.png">
    <meta property="og:url" content="https://plixsmp.my.id">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PLIXSTORE">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #3B3B3B;
            color: #fff;
            background-image: repeating-linear-gradient(
                to right,
                #0000 0px,
                #3B3B3B 19px,
                #555555 20px
            );
            background-size: 20px 20px;
            user-select: none; /* Disable text selection */
            -webkit-user-select: none; /* Disable text selection for Safari */
            -moz-user-select: none; /* Disable text selection for Firefox */
            -ms-user-select: none; /* Disable text selection for Internet Explorer/Edge */
            -webkit-touch-callout: none; /* Disable callout, tab highlight */
        }

        .banner img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .snip1533 {
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.15);
            color: #9e9e9e;
            display: inline-block;
            font-family: 'Roboto', Arial, sans-serif;
            font-size: 16px;
            margin: 35px 10px;
            max-width: 310px;
            min-width: 250px;
            position: relative;
            text-align: center;
            width: 100%;
            background-color: #ffffff;
            border-radius: 5px;
            border-top: 5px solid #d2652d;
        }

        .snip1533 figcaption {
            padding: 13% 10% 12%;
        }

        .snip1533 figcaption:before {
            transform: translateX(-50%);
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.25);
            color: #d2652d;
            content: "\f10e";
            font-family: 'FontAwesome';
            font-size: 32px;
            font-style: normal;
            left: 50%;
            line-height: 60px;
            position: absolute;
            top: -30px;
            width: 60px;
        }

        .snip1533 h3 {
            color: #3c3c3c;
            font-size: 20px;
            font-weight: 300;
            line-height: 24px;
            margin: 10px 0 5px;
        }

        .snip1533 h4 {
            font-weight: 400;
            margin: 0;
            opacity: 0.5;
        }

        .snip1533 blockquote {
            font-style: italic;
            font-weight: 300;
            margin: 0 0 20px;
        }

        .figure-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .snip1533 img {
            width: 100%;
            height: auto;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        /* Loader styles */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 0.4em;
            border-radius: 50%;
            border-top-color: #fff;
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loader" id="loader">
        <div class="spinner-border" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <section class="banner">
        <img src="img/bnr.png" alt="Banner" oncontextmenu="return false;">
    </section>
    
    <p><small><center>jangan lupa geser ke bawah <b>↓</b> dan <b>refresh</b> takut ada update</center></small></p>

    <center>
        <div class="figure-container">
            <figure class="snip1533">
                <img src="img/octo.jpg" alt="Image 1">
                <figcaption>
                    <blockquote>
                        <p>If you do the job badly enough, sometimes you don't get asked to do it again.</p>
                    </blockquote>
                    <h3>Wisteria Ravenclaw</h3>
                    <h4>Google Inc.</h4>
                </figcaption>
            </figure>
            <figure class="snip1533">
                <img src="img/plixsmp.jpg" alt="Image 2">
                <figcaption>
                    <blockquote>
                        <p>I'm killing time while I wait for life to shower me with meaning and happiness.</p>
                    </blockquote>
                    <h3>Ursula Gurnmeister</h3>
                    <h4>Facebook</h4>
                </figcaption>
            </figure>
            <figure class="snip1533">
                <img src="img/setup.png" alt="Image 3">
                <figcaption>
                    <blockquote>
                        <p>The only skills I have the patience to learn are those that have no real application in life.</p>
                    </blockquote>
                    <h3>Ingredia Nutrisha</h3>
                    <h4>Twitter</h4>
                </figcaption>
            </figure>
        </div>
    </center>

    <p><small><center>back ajah kalo mau ke halaman awal</center></small></p>

    <footer>
        <p><small><center>&copy; plixsmp. all rights reserved.</center></small></p>
    </footer>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- Custom JS to hide loader -->
    <script>
        window.addEventListener('load', function () {
            setTimeout(function () {
                document.getElementById('loader').style.display = 'none';
            }, 1000); // Adjust this delay as needed
        });

        // Disable text selection and context menu
        document.addEventListener('DOMContentLoaded', function () {
            document.body.addEventListener('copy', function (e) {
                e.preventDefault();
            });
            
            document.body.addEventListener('contextmenu', function (e) {
                e.preventDefault();
            });

            document.body.addEventListener('selectstart', function (e) {
                e.preventDefault();
            });
        });

        // Daftarkan Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/service-worker.js').then(function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function (error) {
                    console.log('ServiceWorker registration failed: ', error);
                });
            });
        }
    </script>
</body>
</html>
