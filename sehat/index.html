<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Kesehatan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #007bff;
        }

        .schedule {
            margin-top: 2rem;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin: 0.5rem 0 0.2rem;
        }

        input[type="time"] {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 1rem;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .schedule-display {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #e9ecef;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jadwal Kesehatan Anda</h1>
        <div class="schedule">
            <h2>Jadwal Harian</h2>
            <form id="scheduleForm">
                <label for="wakeTime">Waktu Bangun:</label>
                <input type="time" id="wakeTime" name="wakeTime" required>
                
                <label for="exerciseTime">Waktu Olahraga:</label>
                <input type="time" id="exerciseTime" name="exerciseTime" required>
                
                <button type="submit">Simpan Jadwal</button>
            </form>
            <div id="scheduleDisplay" class="schedule-display"></div>
        </div>
    </div>
    <script>
        document.getElementById('scheduleForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const wakeTime = document.getElementById('wakeTime').value;
            const exerciseTime = document.getElementById('exerciseTime').value;

            const display = document.getElementById('scheduleDisplay');
            display.innerHTML = `
                <h3>Jadwal Anda:</h3>
                <p><strong>Waktu Bangun:</strong> ${wakeTime}</p>
                <p><strong>Waktu Olahraga:</strong> ${exerciseTime}</p>
            `;
        });
    </script>
</body>
</html>
